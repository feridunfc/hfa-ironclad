version: "3.9"

services:
  redis-integration:
    image: redis:7.2-alpine
    container_name: hfa-redis-integration
    ports:
      - "6379:6379"
    command: >
      redis-server
      --save ""
      --appendonly no
      --protected-mode no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1s
      timeout: 1s
      retries: 30