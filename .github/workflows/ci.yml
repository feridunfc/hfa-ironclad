name: CI

on:
  push:
    branches: ["main", "feature/**"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Test Suite (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e hfa-core
          pip install -e hfa-control
          pip install -e hfa-worker
          pip install pytest pytest-asyncio fakeredis anyio

      - name: Run core tests
        run: python -m pytest tests/core -q --tb=short

      - name: Run worker tests
        run: python -m pytest tests/ -q --tb=short --ignore=tests/integration --ignore=tests/legacy

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: |
          ruff check hfa-core/src hfa-control/src hfa-worker/src
