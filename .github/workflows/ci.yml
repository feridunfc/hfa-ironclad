name: IRONCLAD CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  core-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-mock fakeredis anyio

      - name: Set PYTHONPATH
        run: |
          echo "PYTHONPATH=$GITHUB_WORKSPACE/hfa-core/src:$GITHUB_WORKSPACE/hfa-control/src:$GITHUB_WORKSPACE/hfa-worker/src:$GITHUB_WORKSPACE/hfa-tools/src" >> $GITHUB_ENV

      - name: Run core tests
        run: |
          python -m pytest tests/core -q