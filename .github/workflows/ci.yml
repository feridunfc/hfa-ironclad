name: IRONCLAD CI

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHONUNBUFFERED: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  core-tests:
    name: Core tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install pytest pytest-asyncio pytest-mock pytest-cov fakeredis anyio
          pip install -e ./hfa-core
          pip install -e ./hfa-control
          pip install -e ./hfa-worker

      - name: Set PYTHONPATH
        run: |
          echo "PYTHONPATH=${GITHUB_WORKSPACE}/hfa-core/src:${GITHUB_WORKSPACE}/hfa-control/src:${GITHUB_WORKSPACE}/hfa-worker/src:${GITHUB_WORKSPACE}/hfa-tools/src" >> $GITHUB_ENV

      - name: Smoke imports
        run: |
          python -c "import hfa.events.schema"
          python -c "import hfa_control"
          python -c "import hfa_worker"
          python -c "import hfa_tools"

      - name: Run core tests
        run: |
          python -m pytest tests/core -q --import-mode=importlib --cov=hfa --cov=hfa_control --cov=hfa_worker --cov=hfa_tools --cov-report=xml --cov-report=term-missing

      - name: Upload coverage xml
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff

      - name: Set PYTHONPATH
        run: |
          echo "PYTHONPATH=${GITHUB_WORKSPACE}/hfa-core/src:${GITHUB_WORKSPACE}/hfa-control/src:${GITHUB_WORKSPACE}/hfa-worker/src:${GITHUB_WORKSPACE}/hfa-tools/src" >> $GITHUB_ENV

      - name: Run ruff
        run: |
          ruff check hfa-core/src hfa-control/src hfa-worker/src hfa-tools/src tests/core

  required-checks:
    name: Required checks
    runs-on: ubuntu-latest
    needs:
      - core-tests
      - lint
    steps:
      - name: All required checks passed
        run: echo "IRONCLAD CI passed."