[pytest]
; IRONCLAD test configuration
minversion = 7.0

testpaths =
    tests/core

python_files = test_*.py
python_classes = Test*
python_functions = test_*

; Python path ayarları
pythonpath =
    hfa-core/src
    hfa-tools/src

; Asyncio configuration
asyncio_mode = strict
asyncio_default_fixture_loop_scope = function

; Marker definitions
markers =
    unit: Unit tests (no external dependencies)
    integration: Tests that require real Redis/Postgres
    slow: Long-running tests (> 1 second)
    critical: Critical path tests (must pass for release)
    security: Security-related tests

; Warning control
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

; Test discovery
norecursedirs =
    tests/legacy
    archive_disabled
    .git
    .venv
    __pycache__
    build
    dist

; Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S