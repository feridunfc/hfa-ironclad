[pytest]
minversion = 7.0

testpaths =
    tests/core
    tests/integration

python_files = test_*.py
python_classes = Test*
python_functions = test_*

pythonpath =
    hfa-core/src
    hfa-tools/src
    hfa-worker/src
    hfa-control/src

asyncio_mode = strict
asyncio_default_fixture_loop_scope = function

addopts = --import-mode=importlib

markers =
    unit: Unit tests (no external dependencies)
    integration: Tests that require real Redis (Docker Compose)
    slow: Long-running tests (> 1 second)
    critical: Critical path tests (must pass for release)
    security: Security-related tests
    chaos: marks tests as chaos engineering scenarios
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

norecursedirs =
    tests/legacy
    archive_disabled
    .git
    .venv
    __pycache__
    build
    dist

log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S